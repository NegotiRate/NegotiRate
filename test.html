<!DOCTYPE html>
<html>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px">
<h2>API Test</h2>
<button onclick="runTest()" style="padding:10px 20px;font-size:16px;cursor:pointer">Test /api/analyze</button>
<pre id="out" style="margin-top:20px;background:#222;padding:20px;white-space:pre-wrap"></pre>
<script>
async function runTest() {
  document.getElementById('out').textContent = 'Testing...';
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        messages: [{role:'user', content:'Say hello in JSON: {"hello":"world"}'}]
      })
    });
    const text = await res.text();
    document.getElementById('out').textContent = 'Status: ' + res.status + '\n\n' + text;
  } catch(e) {
    document.getElementById('out').textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
